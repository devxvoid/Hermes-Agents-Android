name: Build Hermes Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "24"
      JAVA_VERSION: "17"
      PORT: "4173"
      BASE_PATH: "/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build Hermes web app
        run: pnpm --filter @workspace/hermes run build

      - name: Install Capacitor
        run: |
          pnpm add -Dw @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.mrrobot.hermesagents",
            "appName": "Hermes Agents",
            "webDir": "artifacts/hermes/dist/public",
            "bundledWebRuntime": false,
            "android": {
              "allowMixedContent": true
            }
          }
          EOF

      - name: Generate Android project
        run: |
          pnpm exec cap add android
          pnpm exec cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Collect APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/Hermes-Agents-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Agents-debug-apk
          path: output/Hermes-Agents-debug.apk