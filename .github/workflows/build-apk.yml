name: Build Hermes Android APK (With Logs)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "24"
      JAVA_VERSION: "17"
      PORT: "4173"
      BASE_PATH: "/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile | tee install.log

      # 🔧 FIX TYPESCRIPT ISSUE
      - name: Auto-fix Hermes TypeScript null errors
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path("artifacts/hermes/src/pages/Chat.tsx")
          text = path.read_text()

          text = text.replace("selectedAgent)", "(selectedAgent ?? \"\")")
          text = text.replace("selectedAgent,", "(selectedAgent ?? \"\"),")
          text = text.replace("selectedAgent\n", "(selectedAgent ?? \"\")\n")

          path.write_text(text)
          PY

      # 📊 TYPECHECK LOG
      - name: Typecheck workspace
        run: |
          pnpm run typecheck | tee typecheck.log

      # 🌐 WEB BUILD LOG
      - name: Build Hermes web app
        run: |
          pnpm --filter @workspace/hermes run build | tee web-build.log

      - name: Install Capacitor
        run: |
          pnpm add -Dw @capacitor/core @capacitor/cli @capacitor/android | tee capacitor-install.log

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.mrrobot.hermesagents",
            "appName": "Hermes Agents",
            "webDir": "artifacts/hermes/dist/public",
            "bundledWebRuntime": false,
            "android": {
              "allowMixedContent": true
            }
          }
          EOF

      - name: Generate Android project
        run: |
          pnpm exec cap add android | tee cap-add.log
          pnpm exec cap sync android | tee cap-sync.log

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # 🔥 FULL ANDROID BUILD LOG
      - name: Build APK (Verbose)
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --debug \
            | tee gradle-build.log

      # 📦 COLLECT APK
      - name: Collect APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/Hermes-Agents-debug.apk

      # 📊 COLLECT ALL LOGS
      - name: Collect logs
        run: |
          mkdir -p logs
          mv *.log logs/ || true

          # Gradle reports if exist
          if [ -d "android/app/build/reports" ]; then
            cp -r android/app/build/reports logs/gradle-reports
          fi

      # 📤 UPLOAD APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Agents-debug-apk
          path: output/Hermes-Agents-debug.apk

      # 📤 UPLOAD LOGS (ALWAYS)
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: logs