name: Build Hermes Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "24"
      JAVA_VERSION: "21"
      PORT: "4173"
      BASE_PATH: "/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile 2>&1 | tee install.log

      - name: Auto-fix TypeScript and Light Theme
        run: |
          python3 <<'PY'
          from pathlib import Path

          chat = Path("artifacts/hermes/src/pages/Chat.tsx")
          if chat.exists():
              text = chat.read_text()
              text = text.replace("updateConversation(convId,", "updateConversation(convId!,")
              text = text.replace("selectedAgent)", "(selectedAgent ?? \"\")")
              text = text.replace("selectedAgent,", "(selectedAgent ?? \"\"),")
              chat.write_text(text)

          css_files = list(Path("artifacts/hermes/src").rglob("*.css"))
          for path in css_files:
              text = path.read_text()

              patch = """

          /* Android APK Light Mode Fix */
          html.light,
          body.light,
          .light,
          [data-theme="light"] {
            background: #f8fafc !important;
            color: #0f172a !important;
          }

          html.light body,
          .light body,
          [data-theme="light"] body {
            background: #f8fafc !important;
            color: #0f172a !important;
          }

          .light *,
          [data-theme="light"] * {
            border-color: #dbe3ef !important;
          }

          .light input,
          .light textarea,
          .light select,
          [data-theme="light"] input,
          [data-theme="light"] textarea,
          [data-theme="light"] select {
            background: #ffffff !important;
            color: #0f172a !important;
          }

          .light .bg-slate-950,
          .light .bg-slate-900,
          .light .bg-gray-950,
          .light .bg-gray-900,
          .light .bg-neutral-950,
          .light .bg-neutral-900,
          .light .bg-zinc-950,
          .light .bg-zinc-900 {
            background: #f8fafc !important;
          }

          .light .text-white,
          .light .text-slate-100,
          .light .text-gray-100 {
            color: #0f172a !important;
          }
          """

              if "Android APK Light Mode Fix" not in text:
                  path.write_text(text + patch)

          print("Theme patch complete")
          PY

      - name: Typecheck workspace
        run: pnpm run typecheck 2>&1 | tee typecheck.log

      - name: Build Hermes web app
        run: pnpm --filter @workspace/hermes run build 2>&1 | tee web-build.log

      - name: Install Capacitor
        run: pnpm add -Dw @capacitor/core @capacitor/cli @capacitor/android 2>&1 | tee capacitor-install.log

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.mrrobot.hermesagents",
            "appName": "Hermes Agents",
            "webDir": "artifacts/hermes/dist/public",
            "bundledWebRuntime": false
          }
          EOF

      - name: Generate Android project
        run: |
          pnpm exec cap add android 2>&1 | tee cap-add.log
          pnpm exec cap sync android 2>&1 | tee cap-sync.log

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ../gradle-build.log

      - name: Collect APK
        if: always()
        run: |
          mkdir -p output
          find android -type f -name "*.apk" 2>/dev/null | tee apk-files.log || true
          APK_PATH="$(find android -type f -name "*.apk" 2>/dev/null | head -n 1 || true)"

          if [ -z "$APK_PATH" ]; then
            echo "No APK found."
            exit 1
          fi

          cp "$APK_PATH" output/Hermes-Agents-debug.apk

      - name: Collect logs
        if: always()
        run: |
          mkdir -p logs
          cp *.log logs/ 2>/dev/null || true
          find android -type f -name "*.log" -exec cp {} logs/ \; 2>/dev/null || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Agents-debug-apk
          path: output/Hermes-Agents-debug.apk

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Agents-build-logs
          path: |
            logs
            *.log
          if-no-files-found: warn