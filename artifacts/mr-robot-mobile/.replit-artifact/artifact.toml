kind = "mobile"
previewPath = "/mobile/"
title = "Mr. Robot Mobile"
version = "1.0.0"
id = "artifacts/mr-robot-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 22333

[services.development]
run = "node /home/runner/workspace/artifacts/mr-robot-mobile/scripts/dev-wrapper.js"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mr-robot-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mr-robot-mobile", "run", "serve" ]

[services.env]
PORT = "22333"
BASE_PATH = "/mobile/"
